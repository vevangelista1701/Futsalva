<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login FutSalva</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">

        <img src="img/logo.png" alt="Logo FutSalva">

        <h1>Área Administrativa</h1>

        <input
            type="text"
            id="usuario"
            placeholder="Usuário">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button onclick="fazerLogin()">
            Entrar
        </button>

        <p id="erro"></p>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
